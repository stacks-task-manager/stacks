name: CLA Assistant

on:
    issue_comment:
        types: [created]
    pull_request_target:
        types: [opened, closed, synchronize]

permissions:
    actions: write
    contents: write
    pull-requests: write
    statuses: write

jobs:
    cla-check:
        name: Check CLA signatures
        runs-on: ubuntu-latest
        steps:
            - name: "CLA Assistant"
              if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
              uses: iainmcgin/cla-github-action@0d27e5a16278d4adb6b0c4b92f08ad27b0a21dc8
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  # PERSONAL_ACCESS_TOKEN (optional) — only needed if signatures are stored in a separate repo.
                  # PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
              with:
                  # Path inside this repo where signature records are stored.
                  path-to-signatures: ".github/cla-signatures/signatures.json"

                  # Path to the CLA text contributors must sign against.
                  path-to-document: "https://github.com/stacks-task-manager/stacks/blob/main/.github/CLA.md"

                  # Branch where the action commits new signatures. Created automatically if missing.
                  branch: "main"

                  # The exact phrase contributors comment to sign.
                  custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"

                  # Allowed accounts that don't need to sign (the maintainer, bots).
                  allowlist: "cristianbarlutiu,dependabot[bot]"

                  # Make the check informational rather than blocking on first PR if you prefer;
                  # leave the default to block merges until signed.
                  # use-dco-flag: false
