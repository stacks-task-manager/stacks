<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Password reset - Stacks</title>
        <link rel="stylesheet" href="/static/assets/css/stacks.min.css" as="style" />
    </head>

    <body>
        <div class="d-flex flex__center ps-fixed t0 b0 l0 r0 bg-theme-secondary-100 overflow-y-auto">
            <div class="flex--item">
                <div class="wmx3 p24 mb24 bg-white bar-lg bs-xl">
                    <form
                        id="account-recovery"
                        class="d-flex gs12 gsy fd-column"
                        action="/login/password-recovery"
                        method="post"
                    >
                        <div class="d-flex jc-center mb24 mt24">
                            <svg data-spot="SpotAnswerLg" class="fc-blue-400"></svg>
                        </div>

                        <h2 class="ta-center">Password reset</h2>

                        <div class="d-flex fd-column g16">
                            {{#if errors}}
                            <div class="s-notice s-notice__warning s-notice__important" role="alert">
                                {{#each errors}}
                                <div>{{this}}</div>
                                {{/each}}
                            </div>
                            {{/if}}

                            <p>Recover account for username@email.com</p>

                            <div class="d-flex fd-column gs4 gsy js-auth-item">
                                <label class="flex--item s-label" for="password1">New password</label>
                                <div class="d-flex ps-relative">
                                    <input
                                        class="flex--item s-input"
                                        type="password"
                                        name="password1"
                                        id="password1"
                                        required
                                    />
                                </div>
                            </div>

                            <div class="d-flex fd-column gs4 gsy js-auth-item">
                                <label class="flex--item s-label" for="password2">New password (again)</label>
                                <div class="d-flex ps-relative">
                                    <input
                                        class="flex--item s-input"
                                        type="password"
                                        name="password2"
                                        id="password2"
                                        required
                                    />
                                </div>
                            </div>

                            <button
                                class="flex--item s-btn s-btn__filled"
                                id="submit-button"
                                name="submit-button"
                            >
                                Reset my passoword
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script src="/static/assets/js/browser.umd.js"></script>
    </body>
</html>
