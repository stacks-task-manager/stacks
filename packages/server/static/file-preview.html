<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>File preview - Stacks</title>
        <link rel="stylesheet" href="/static/assets/css/stacks.min.css" as="style" />
    </head>

    <body>
        <div class="d-flex flex__center ps-fixed t0 b0 l0 r0 bg-theme-secondary-100 overflow-y-auto">
            <div class="flex--item">
                <div class="s-card bs-lg p16">
                    {{#if hasPreview}}
                    <img class="mb16" src="{{previewUrl}}" alt="{{originalName}}" />
                    {{else}}
                    <div class="d-flex jc-center ps-relative mb24">
                        <svg
                            width="128"
                            height="128"
                            viewBox="0 0 24 24"
                            fill="none"
                            xmlns="http://www.w3.org/2000/svg"
                        >
                            <path
                                d="M14 2.26946V6.4C14 6.96005 14 7.24008 14.109 7.45399C14.2049 7.64215 14.3578 7.79513 14.546 7.89101C14.7599 8 15.0399 8 15.6 8H19.7305M20 9.98822V17.2C20 18.8802 20 19.7202 19.673 20.362C19.3854 20.9265 18.9265 21.3854 18.362 21.673C17.7202 22 16.8802 22 15.2 22H8.8C7.11984 22 6.27976 22 5.63803 21.673C5.07354 21.3854 4.6146 20.9265 4.32698 20.362C4 19.7202 4 18.8802 4 17.2V6.8C4 5.11984 4 4.27976 4.32698 3.63803C4.6146 3.07354 5.07354 2.6146 5.63803 2.32698C6.27976 2 7.11984 2 8.8 2H12.0118C12.7455 2 13.1124 2 13.4577 2.08289C13.7638 2.15638 14.0564 2.27759 14.3249 2.44208C14.6276 2.6276 14.887 2.88703 15.4059 3.40589L18.5941 6.59411C19.113 7.11297 19.3724 7.3724 19.5579 7.67515C19.7224 7.94356 19.8436 8.2362 19.9171 8.5423C20 8.88757 20 9.25445 20 9.98822Z"
                                stroke="#ccc"
                                stroke-width="0.5"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                fill="none"
                            />
                        </svg>
                        <div class="ps-absolute fs-headline1 t50 fc-silver-400">{{extension}}</div>
                    </div>
                    {{/if}}

                    <div class="mb16">
                        <div class="fs-title">{{originalName}}</div>
                        <div class="fs-body1">{{humanSize}}</div>
                    </div>

                    <div class="d-flex jc-end">
                        <a class="s-btn s-btn__filled s-btn__featured" href="{{downloadUrl}}">
                            Download ({{humanSize}})
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <script src="/static/assets/js/browser.umd.js"></script>
    </body>
</html>
