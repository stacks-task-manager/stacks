<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Password recovery - Stacks</title>
        <link rel="stylesheet" href="/static/assets/css/stacks.min.css" as="style" />
    </head>

    <body>
        <div class="d-flex flex__center ps-fixed t0 b0 l0 r0 bg-theme-secondary-100 overflow-y-auto">
            <div class="flex--item">
                <div class="wmx3 p24 mb24 bg-white bar-lg bs-xl" data-testid="password-recovery-card">
                    <form
                        id="account-recovery"
                        class="d-flex gs12 gsy fd-column"
                        action="/login/password-recovery"
                        method="post"
                    >
                        <div class="d-flex jc-center mb24 mt24">
                            <svg data-spot="SpotLockLg" class="fc-blue-400"></svg>
                        </div>

                        <h2 class="ta-center">Password recovery</h2>

                        <div class="d-flex fd-column g16">
                            {{#if errors}}
                            <div class="s-notice s-notice__warning s-notice__important" role="alert">
                                {{#each errors}}
                                <div>{{this}}</div>
                                {{/each}}
                            </div>
                            {{/if}}

                            <p>
                                Forgot your account’s password? Enter your email address and we’ll send you a
                                recovery link.
                            </p>

                            <div class="d-flex fd-column gs4 gsy js-auth-item">
                                <label class="flex--item s-label" for="email">Email</label>
                                <div class="d-flex ps-relative">
                                    <input
                                        class="flex--item s-input"
                                        type="email"
                                        name="email"
                                        id="email"
                                        required
                                    />
                                </div>
                                <p class="s-input-message mb0 js-error-message d-none"></p>
                            </div>

                            <button
                                class="flex--item s-btn s-btn__filled"
                                id="submit-button"
                                name="submit-button"
                            >
                                Send recovery email
                            </button>
                        </div>
                    </form>
                </div>

                <div
                    class="mx-auto ta-center fs-body1 p16 pb0 w100 wmx3"
                    data-testid="password-recovery-footer"
                >
                    I remember my password! <a href="/login">Log in</a>
                </div>
            </div>
        </div>

        <script src="/static/assets/js/browser.umd.js"></script>
    </body>
</html>
