nodeLinker: node-modules

# If you add a Tiptap Pro extension to any package later (e.g. @tiptap-pro/extension-*),
# you will need to re-add an `npmScopes` block here that authenticates against
# the Tiptap Pro registry. The token MUST be supplied via env var — never commit it.
# See docs/TIPTAP_PRO.md for the full snippet and how to obtain a token.

plugins:
  - path: .yarn/plugins/@stacks/plugin-setup.cjs
    spec: "@stacks/plugin-setup"

yarnPath: .yarn/releases/yarn-3.6.4.cjs
